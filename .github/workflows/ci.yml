name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (Linux GUI build)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libdbus-1-dev \
            pkg-config

      - name: Install frontend dependencies
        run: npm ci

      - name: Build GUI (Tauri)
        run: npm run tauri build -- --no-bundle

      - name: Test GUI Backend
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build TUI (CLI)
        run: cargo build --manifest-path cli/Cargo.toml

      - name: Test TUI (CLI)
        run: cargo test --manifest-path cli/Cargo.toml
